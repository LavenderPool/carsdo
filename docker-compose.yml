services:
    app:
        build:
            context: .
            dockerfile: _docker/app/Dockerfile
        working_dir: /var/www
        ports:
            - "5173:5173"
        environment:
            DB_HOST: db
        volumes:
            - ./:/var/www
        depends_on:
            - db
        networks:
            - laravel

    nginx:
        image: nginx:alpine
        ports:
            - "${APP_PORT:-8000}:80"
        volumes:
            - ./:/var/www
            - ./_docker/nginx/conf.d/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - laravel

    db:
        image: mysql:8.4
        ports:
            - "${FORWARD_DB_PORT:-3306}:3306"
        environment:
            MYSQL_DATABASE: "${DB_DATABASE:-laravel}"
            MYSQL_USER: "${DB_USERNAME:-laravel}"
            MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - laravel

volumes:
    db_data:

networks:
    laravel:
        driver: bridge
